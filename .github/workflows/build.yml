name: Build DeFreq+

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:   # allows manual trigger from Actions tab

jobs:
  build:
    runs-on: windows-latest

    strategy:
      matrix:
        arch: [x64, Win32]
        include:
          - arch: x64
            platform: x64
            folder_suffix: "64"
          - arch: Win32
            platform: Win32
            folder_suffix: "32"

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Clone AviSynth+ headers
        run: |
          git clone --depth 1 https://github.com/AviSynth/AviSynthPlus.git "${{ runner.temp }}/AviSynthPlus"

      - name: Configure CMake
        run: |
          cmake -B build -G "Visual Studio 17 2022" -A ${{ matrix.arch }} `
            -DAVISYNTH_INCLUDE_DIR="${{ runner.temp }}/AviSynthPlus/avs_core/include"

      - name: Build
        run: cmake --build build --config Release

      - name: Prepare artifact
        run: |
          mkdir -p artifact
          cp build/Release/DeFreq.dll artifact/DeFreq.dll
          cp README.md artifact/
          cp gpl.txt artifact/
        shell: bash

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: DeFreq-${{ matrix.folder_suffix }}bit
          path: artifact/

  # ── Create a GitHub Release when a tag is pushed ──────────────────────────
  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download 64-bit artifact
        uses: actions/download-artifact@v4
        with:
          name: DeFreq-64bit
          path: DeFreq-64bit

      - name: Download 32-bit artifact
        uses: actions/download-artifact@v4
        with:
          name: DeFreq-32bit
          path: DeFreq-32bit

      - name: Package zips
        run: |
          cd DeFreq-64bit && zip -r ../DeFreqPlus-x64.zip . && cd ..
          cd DeFreq-32bit && zip -r ../DeFreqPlus-x86.zip . && cd ..

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            DeFreqPlus-x64.zip
            DeFreqPlus-x86.zip
          generate_release_notes: true
